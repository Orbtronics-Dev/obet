name: obet

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: obet
      POSTGRES_USER: obet
      POSTGRES_PASSWORD: ${DB_PASSWORD:-obet}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obet -d obet"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

